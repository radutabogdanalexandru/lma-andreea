<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La mulți ani, Andreea! ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    min-height:100vh;
    overflow-x:hidden;
    color:white;
}

/* BACKGROUND LAYER */
#hearts {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
}

/* MAIN CONTENT ABOVE */
.screen{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:30px;
    position:relative;
    z-index:2;
}

h1{
    font-size:3rem;
    margin-bottom:20px;
}

p{
    max-width:700px;
    line-height:1.8;
    font-size:1.2rem;
}

button{
    margin-top:25px;
    padding:15px 30px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4f81;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.hidden{
    display:none;
}

.quiz-box{
    max-width:700px;
}

.option{
    background:white;
    color:#ff4f81;
    margin:10px;
    padding:15px;
    border-radius:15px;
    cursor:pointer;
    transition:0.2s;
}

.option:hover{
    transform:scale(1.03);
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
    width:100%;
    max-width:900px;
    margin-top:25px;
}

.gallery img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:20px;
}

/* FLOATING HEARTS */
.heart{
    position:fixed;
    font-size:20px;
    animation:floatUp linear infinite;
    opacity:0.6;
    z-index:0;
}

@keyframes floatUp{
    from{
        transform:translateY(110vh) scale(0.8);
        opacity:1;
    }
    to{
        transform:translateY(-20vh) scale(1.4);
        opacity:0;
    }
}

.final{
    font-size:1.5rem;
    line-height:2;
}
</style>
</head>

<body>

<div id="hearts"></div>

<section id="intro" class="screen">
    <h1>🎂 La mulți ani, Andreea! ❤️</h1>
    <p>Astăzi este ziua ta și am pregătit un mic joc doar pentru tine ✨</p>
    <button onclick="startStory()">Începe surpriza 💖</button>
</section>

<section id="story" class="screen hidden">
    <h1>💌 Pentru tine, Andreea</h1>
    <p>Îți dorim un an plin de bucurii, zâmbete și oameni frumoși ❤️</p>
    <button onclick="startQuiz()">Continuă ➜</button>
</section>

<section id="quiz" class="screen hidden">
    <div class="quiz-box">
        <h1>🎮 Joc mic pentru tine</h1>
        <p id="question"></p>
        <div id="answers"></div>
    </div>
</section>

<section id="galleryScreen" class="screen hidden">
    <h1>📸 Amintiri frumoase</h1>
    <div class="gallery">
        <img src="poza01.jpeg">
        <img src="poza02.jpeg">
        <img src="poza03.jpeg">
        <img src="poza04.jpeg">
        <img src="poza05.jpeg">
    </div>
    <button onclick="showFinal()">Surpriza finală 🎁</button>
</section>

<section id="final" class="screen hidden">
    <h1>🎉 La mulți ani! 🎉</h1>
    <div class="final">
        Îți dorim fericire, sănătate și iubire ❤️
    </div>
</section>

<script>

const quiz = [
{ question:"Cine este sărbătorita?", answers:["Andreea","O legendă","O persoană specială","Toate"], correct:3 },
{ question:"Ce merită?", answers:["Fericire","Iubire","Zâmbete","Tot"], correct:3 },
{ question:"Cât de specială este?", answers:["Mult","Foarte mult","Enorm","Inimaginabil"], correct:3 }
];

let current = 0;

function startStory(){
    document.getElementById("intro").classList.add("hidden");
    document.getElementById("story").classList.remove("hidden");
}

function startQuiz(){
    document.getElementById("story").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");
    loadQuestion();
}

function loadQuestion(){
    const q = quiz[current];
    document.getElementById("question").innerText = q.question;

    const answers = document.getElementById("answers");
    answers.innerHTML = "";

    q.answers.forEach((ans,index)=>{
        const div = document.createElement("div");
        div.className = "option";
        div.innerText = ans;

        div.onclick = () => {
            if(index === q.correct){
                current++;
                if(current < quiz.length){
                    loadQuestion();
                } else {
                    document.getElementById("quiz").classList.add("hidden");
                    document.getElementById("galleryScreen").classList.remove("hidden");
                }
            } else {
                alert("Mai încearcă 😊");
            }
        };

        answers.appendChild(div);
    });
}

/* CONFETTI (lightweight) */
function showFinal(){
    document.getElementById("galleryScreen").classList.add("hidden");
    document.getElementById("final").classList.remove("hidden");

    for(let i=0;i<80;i++){
        let el = document.createElement("div");
        el.innerHTML = ["🎉","❤️","✨","🎂"][Math.floor(Math.random()*4)];
        el.style.position = "fixed";
        el.style.left = Math.random()*100 + "vw";
        el.style.top = "-40px";
        el.style.fontSize = (18+Math.random()*25)+"px";
        el.style.zIndex = 9999;
        document.body.appendChild(el);

        let pos = 0;

        let fall = setInterval(()=>{
            pos += 4 + Math.random()*3;
            el.style.top = pos + "px";

            if(pos > window.innerHeight){
                clearInterval(fall);
                el.remove();
            }
        },20);
    }
}

/* HEART BACKGROUND */
const heartsContainer = document.getElementById("hearts");

function createHeart(){
    const h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "❤️";

    h.style.left = Math.random()*100 + "vw";
    h.style.fontSize = (12 + Math.random()*20) + "px";
    h.style.animationDuration = (5 + Math.random()*6) + "s";

    heartsContainer.appendChild(h);

    setTimeout(()=>h.remove(), 11000);
}

setInterval(createHeart, 250);

</script>

</body>
</html>
